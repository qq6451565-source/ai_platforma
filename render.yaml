services:
  # ── Backend (Django + Channels) ──────────────────────────────────────
  # AI Gateway is hosted on HF Spaces: https://qwertyu6451565-ai-gataware.hf.space
  - type: web
    name: ai-platforma-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: python -m pip install "pip<24.1" && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash -c "python manage.py migrate && python manage.py ensure_superuser && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: AI_ENABLED
        value: "true"
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        sync: false
      - key: AI_TIMEOUT
        value: "120"
      - key: AI_RETRY
        value: "1"
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: AGORA_TOKEN_TTL
        value: "3600"
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: AUTO_CREATE_SUPERUSER
        value: "true"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_ROLE
        value: "admin"
