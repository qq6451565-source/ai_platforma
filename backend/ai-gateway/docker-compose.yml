version: '3.8'

services:
  ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models  # Agar model fayllarini tashqaridan yuklasangiz
    environment:
      - AI_ENABLED=true
      - FACE_MATCH_THRESHOLD=${FACE_MATCH_THRESHOLD:-0.55}
      - PRESENCE_THRESHOLD=${PRESENCE_THRESHOLD:-0.5}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3