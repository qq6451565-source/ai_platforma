name: Build and Push AI Gateway

on:
  push:
    paths:
      - 'backend/ai-gateway/**'
      - '.github/workflows/ai-gateway.yml'
  pull_request:
    paths:
      - 'backend/ai-gateway/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ai-gateway
          file: ./backend/ai-gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-gateway:latest

      - name: Compose up for test
        run: |
          docker-compose -f ./backend/ai-gateway/docker-compose.yml up -d
          sleep 10
          docker ps

      - name: Health check
        run: |
          curl --fail http://localhost:8000/health || exit 1

      - name: Compose down
        run: |
          docker-compose -f ./backend/ai-gateway/docker-compose.yml down
