name: Deploy AI Gateway to Hugging Face Space

# 'ai-gateway/' papkasidagi o'zgarishlar master'ga push qilinganda
# kod avtomatik ravishda HF Space git reposiga ko'chiriladi va Space qayta quriladi.
#
# Talab: GitHub repo Settings > Secrets and variables > Actions da
#   HF_TOKEN  — Hugging Face write-token (https://huggingface.co/settings/tokens)
# secret sifatida qo'shilgan bo'lishi kerak.

on:
  push:
    branches: [master]
    paths:
      - 'ai-gateway/**'
      - '.github/workflows/ai-gateway.yml'
  workflow_dispatch: {}

# Bir vaqtda faqat bitta deploy ishlasin
concurrency:
  group: hf-ai-gateway-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_SPACE: qwertyu6451565/ai-gataware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HF_TOKEN
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::error::HF_TOKEN secret o'rnatilmagan. Repo Settings > Secrets > Actions da qo'shing."
            exit 1
          fi

      - name: Push ai-gateway to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          WORK="$RUNNER_TEMP/hf-gateway"
          rm -rf "$WORK"
          mkdir -p "$WORK"

          # Faqat kerakli fayllarni nusxalaymiz; secret/junk fayllar chiqarib tashlanadi
          rsync -a --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude 'logs' \
            --exclude '*.log' \
            --exclude '.env' \
            --exclude '*.env' \
            ai-gateway/ "$WORK/"

          cd "$WORK"
          git init -q
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -q -m "Sync from GitHub @ ${GITHUB_SHA::7}"
          git branch -M main

          # HF Space repo'ga majburiy push (Space avtomatik qayta quriladi)
          git push -f "https://github-actions:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}.git" main

      - name: Done
        run: echo "✅ ai-gateway HF Space (${HF_SPACE}) ga deploy qilindi."
